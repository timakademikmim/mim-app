name: Android Release

on:
  push:
    tags:
      - "android-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload-android:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.ref_name }}
      APP_DIR: src-tauri/gen/android/app
      OUTPUT_DIR: release-assets/android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Regenerate app icons from source image
        shell: bash
        run: |
          if [ -f "iconMIM-android.png" ]; then
            cp "iconMIM-android.png" "src-tauri/icons/icon.png"
            npx @tauri-apps/cli@latest icon "src-tauri/icons/icon.png"
          elif [ -f "iconMIM.png" ]; then
            cp "iconMIM.png" "src-tauri/icons/icon.png"
            npx @tauri-apps/cli@latest icon "src-tauri/icons/icon.png"
          else
            echo "Sumber icon tidak ditemukan, memakai icon yang sudah ada."
          fi

      - name: Sync Android launcher icons
        shell: bash
        run: |
          cp -R src-tauri/icons/android/. src-tauri/gen/android/app/src/main/res/

      - name: Prepare Android release signing
        shell: bash
        run: |
          mkdir -p "$APP_DIR"
          if [ -z "${{ secrets.MIM_ANDROID_KEYSTORE_BASE64 }}" ] || [ -z "${{ secrets.MIM_ANDROID_KEYSTORE_PASSWORD }}" ] || [ -z "${{ secrets.MIM_ANDROID_KEY_ALIAS }}" ] || [ -z "${{ secrets.MIM_ANDROID_KEY_PASSWORD }}" ]; then
            echo "Release signing secret belum lengkap. Build Android release dihentikan agar tidak menghasilkan APK konflik signature."
            exit 1
          fi
          echo "${{ secrets.MIM_ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$APP_DIR/mim-release.keystore"
          {
            echo "MIM_ANDROID_KEYSTORE=$GITHUB_WORKSPACE/$APP_DIR/mim-release.keystore"
            echo "MIM_ANDROID_KEYSTORE_PASSWORD=${{ secrets.MIM_ANDROID_KEYSTORE_PASSWORD }}"
            echo "MIM_ANDROID_KEY_ALIAS=${{ secrets.MIM_ANDROID_KEY_ALIAS }}"
            echo "MIM_ANDROID_KEY_PASSWORD=${{ secrets.MIM_ANDROID_KEY_PASSWORD }}"
          } >> "$GITHUB_ENV"

      - name: Compute Android version from tag
        shell: bash
        run: |
          VERSION_CLEAN="${TAG_NAME#android-v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_CLEAN"
          MAJOR="${MAJOR:-0}"
          MINOR="${MINOR:-0}"
          PATCH="${PATCH:-0}"
          VERSION_CODE=$((MAJOR * 1000000 + MINOR * 1000 + PATCH))
          {
            echo "MIM_ANDROID_VERSION_NAME=$VERSION_CLEAN"
            echo "MIM_ANDROID_VERSION_CODE=$VERSION_CODE"
          } >> "$GITHUB_ENV"
          cat > "$APP_DIR/tauri.properties" <<EOF
          tauri.android.versionName=$VERSION_CLEAN
          tauri.android.versionCode=$VERSION_CODE
          EOF

      - name: Build Android APK (arm64 release)
        run: npx @tauri-apps/cli@latest android build --apk --target aarch64 --split-per-abi

      - name: Collect signed APK artifacts
        shell: bash
        run: |
          mkdir -p "$OUTPUT_DIR"
          VERSION_CLEAN="${TAG_NAME#android-v}"
          APK_VERSIONED="$OUTPUT_DIR/MIM.App_${VERSION_CLEAN}_android_arm64.apk"
          APK_UPDATER="$OUTPUT_DIR/app-universal-release.apk"

          SIGNED_APK=$(find "$APP_DIR/build/outputs/apk/arm64/release" -maxdepth 1 -type f -name "*.apk" ! -name "*-unsigned.apk" | head -n 1)
          if [ -z "$SIGNED_APK" ]; then
            echo "Signed APK tidak ditemukan di outputs. Pastikan signing release aktif."
            exit 1
          fi

          cp "$SIGNED_APK" "$APK_VERSIONED"
          cp "$SIGNED_APK" "$APK_UPDATER"

      - name: Verify APK signature
        shell: bash
        run: |
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort | tail -n 1)
          "$APKSIGNER" verify --verbose "$OUTPUT_DIR/app-universal-release.apk"

      - name: Generate mobile-latest.json
        shell: bash
        run: |
          VERSION_CLEAN="${TAG_NAME#android-v}"
          APK_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/app-universal-release.apk"
          NOW_UTC="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          cat > "$OUTPUT_DIR/mobile-latest.json" <<EOF
          {
            "version": "${VERSION_CLEAN}",
            "notes": "Android release ${VERSION_CLEAN}. Pembaruan stabilitas dan kompatibilitas mobile.",
            "pub_date": "${NOW_UTC}",
            "mobile": {
              "apk": "${APK_URL}"
            }
          }
          EOF

      - name: Upload APK assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Android Release ${{ github.ref_name }}
          prerelease: false
          make_latest: true
          files: |
            release-assets/android/MIM.App_*_android_arm64.apk
            release-assets/android/app-universal-release.apk
            release-assets/android/mobile-latest.json
