name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: MIM Desktop ${{ github.ref_name }}
          releaseBody: |
            What's new in this version:
            - Android update prompt: popup update hanya muncul jika versi terbaru lebih tinggi dari versi terpasang.
            - Installer Android manual dirapikan: tersedia output ARM64 khusus agar ukuran APK lebih ringan.
            - Ikon aplikasi Android diperbarui agar branding MIM lebih konsisten.
            - Penyempurnaan fallback catatan rilis agar menu Info tetap menampilkan what's new per versi.
          releaseDraft: false
          prerelease: false

