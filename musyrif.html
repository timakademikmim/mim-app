<!DOCTYPE html>
<html lang="id">
<head>
  
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Panel Musyrif</title>
  <link rel="icon" type="image/png" href="00%20Logo%20MIM%20.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="guru.css?v=20260305-sidebar-transition-01">
</head>

<body data-role="musyrif">
  <div class="layout">
    <aside class="sidebar">
      <img src="00 Logo MIM .png" alt="Logo Musyrif" class="sidebar-logo">
      <div class="sidebar-nav-scroll">
        <button class="guru-nav-btn" data-page="dashboard" onclick="loadMusyrifPage('dashboard')">Dashboard</button>
        <button class="guru-nav-btn" data-page="laporan-bulanan" onclick="loadMusyrifPage('laporan-bulanan')">Laporan Bulanan</button>
        <button class="guru-nav-btn" data-page="data-kamar" onclick="loadMusyrifPage('data-kamar')">Data Kamar</button>
        <button class="guru-nav-btn" data-page="perizinan-santri" onclick="loadMusyrifPage('perizinan-santri')">Perizinan Santri</button>
        <button class="guru-nav-btn" id="musyrif-nav-prestasi-pelanggaran" data-page="prestasi-pelanggaran" onclick="loadMusyrifPage('prestasi-pelanggaran')" style="display:none;">Prestasi & Pelanggaran</button>
        <button class="guru-nav-btn" id="musyrif-nav-ekskul" data-page="ekskul" onclick="loadMusyrifPage('ekskul')" style="display:none;">Ekskul</button>
      </div>
    </aside>

    <main class="content">
      <div class="topbar">
        <div class="topbar-left">
          <button type="button" id="musyrif-sidebar-toggle" class="topbar-sidebar-toggle" onclick="toggleMusyrifSidebar()" aria-label="Toggle sidebar" title="Sembunyikan/Tampilkan Sidebar">&#9776;</button>
          <div id="musyrif-topbar-title" class="topbar-title">Dashboard</div>
        </div>
        <div class="topbar-user-menu-wrap">
          <button type="button" class="topbar-user-trigger" onclick="toggleTopbarUserMenu()">
            <span id="welcome" class="topbar-user-name"></span>
            <span class="topbar-user-arrow">&#9662;</span>
          </button>
          <div id="topbar-user-menu" class="topbar-user-menu">
            <button type="button" onclick="openMusyrifProfile()">Profil</button>
            <button type="button" onclick="logout()">Logout</button>
          </div>
        </div>
      </div>
      <div id="musyrif-content" class="content-area">Loading...</div>
      <div class="page-bg-signature" aria-hidden="true">Copyright &copy; BnB Studio</div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared/app-utils.js?v=20260304-shared-utils-01"></script>
  <script src="shared/popup-utils.js?v=20260304-shared-popup-01"></script>
  <script src="shared/topbar-utils.js?v=20260304-shared-topbar-01"></script>
  <script src="shared/profile-photo-utils.js?v=20260304-shared-profile-photo-01"></script>
  <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="chat-module.js?v=20260308-chat-emoji-outside-close-03"></script>
  <script src="role-page.js?v=20260308-android-version-fix-01"></script>
  <script src="musyrif.js?v=20260308-chat-back-no-loading-02"></script>

  <div id="app-popup-overlay" class="app-popup-overlay" aria-hidden="true">
    <div class="app-popup-card" role="dialog" aria-modal="true" aria-labelledby="app-popup-message">
      <div id="app-popup-message" class="app-popup-message"></div>
      <div id="app-popup-actions" class="app-popup-actions">
        <button type="button" id="app-popup-ok-btn">OK</button>
      </div>
    </div>
  </div>
</body>
</html>
