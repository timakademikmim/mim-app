<style>
  .ekskul-label {
    display: block;
    font-size: 12px;
    color: #64748b;
    margin-bottom: 4px;
    font-weight: 500;
  }
  .ekskul-field {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid #cbd5e1;
    border-radius: 999px;
    background: #f8fafc;
    box-sizing: border-box;
    outline: none;
    font-size: 13px;
    color: #0f172a;
  }
  .ekskul-field:focus {
    border-color: #16a34a;
    box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.25);
    background: #ffffff;
  }
</style>

<div class="card" style="padding:16px; margin-bottom:12px; border:1px solid #e2e8f0; border-radius:12px; background:#fff;">
  <h3 style="margin:0 0 10px;">Ekstrakulikuler</h3>
  <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px;">
    <div style="display:grid; gap:4px;">
      <label class="ekskul-label">Nama Ekskul</label>
      <input id="ekskul-admin-nama" class="ekskul-field" type="text" placeholder="Contoh: Pramuka">
    </div>
    <div style="display:grid; gap:4px;">
      <label class="ekskul-label">PJ Karyawan 1</label>
      <select id="ekskul-admin-pj" class="ekskul-field"></select>
    </div>
    <div style="display:grid; gap:4px;">
      <label class="ekskul-label">PJ Karyawan 2 (Opsional)</label>
      <select id="ekskul-admin-pj-2" class="ekskul-field"></select>
    </div>
    <div style="display:grid; gap:4px;">
      <label class="ekskul-label">Deskripsi</label>
      <input id="ekskul-admin-deskripsi" class="ekskul-field" type="text" placeholder="Opsional">
    </div>
  </div>
  <div style="margin-top:12px; display:flex; justify-content:flex-end;">
    <button type="button" class="modal-btn modal-btn-primary" onclick="saveEkskulAdmin()">Simpan</button>
  </div>
</div>

<div class="card" style="padding:16px;">
  <div style="display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:10px;">
    <h3 style="margin:0;">Daftar Ekskul</h3>
    <button type="button" class="modal-btn" onclick="loadEkskulAdminPage(true)">Refresh</button>
  </div>
  <div id="ekskul-admin-list">Loading...</div>
</div>

<div id="ekskul-admin-detail-overlay" style="display:none; position:fixed; inset:0; background:rgba(15,23,42,.38); z-index:3000; padding:18px;" onclick="closeEkskulAdminDetail()">
  <div style="max-width:900px; margin:0 auto; background:#fff; border-radius:12px; border:1px solid #e2e8f0; overflow:hidden;" onclick="event.stopPropagation()">
    <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 14px; border-bottom:1px solid #e2e8f0;">
      <div id="ekskul-admin-detail-title" style="font-weight:700;">Detail Ekskul</div>
      <button type="button" class="modal-btn" onclick="closeEkskulAdminDetail()">Tutup</button>
    </div>
    <div id="ekskul-admin-detail-body" style="padding:12px;">Loading...</div>
  </div>
</div>
