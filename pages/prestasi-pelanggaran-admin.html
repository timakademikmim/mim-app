<style>
  .pp-admin-wrap { display:grid; gap:12px; }
  .pp-admin-card {
    border:1px solid #e2e8f0;
    border-radius:14px;
    background:#fff;
    padding:12px;
  }
  .pp-admin-title {
    font-weight:700;
    margin-bottom:10px;
    font-size:14px;
    color:#0f172a;
  }
  .pp-label {
    display:block;
    font-size:12px;
    color:#64748b;
    margin-bottom:5px;
    font-weight:600;
  }
  .pp-field {
    width:100%;
    border:1px solid #dbe2ea;
    background:#f8fafc;
    color:#0f172a;
    border-radius:12px;
    padding:10px 12px;
    font-size:13px;
    line-height:1.3;
    transition:border-color .18s ease, box-shadow .18s ease, background-color .18s ease;
    box-sizing:border-box;
  }
  .pp-field:focus {
    outline:none;
    border-color:#cbd5e1;
    background:#fff;
    box-shadow:0 0 0 3px rgba(148, 163, 184, 0.16);
  }
  .pp-admin-table {
    width:100%;
    border-collapse:collapse;
    font-size:12px;
  }
  .pp-admin-table th,
  .pp-admin-table td {
    padding:7px;
    border:1px solid #e2e8f0;
  }
</style>

<div class="pp-admin-wrap">
  <div style="display:flex; gap:8px; flex-wrap:wrap;">
    <button id="pp-admin-tab-prestasi" type="button" class="modal-btn modal-btn-primary" onclick="setPrestasiPelanggaranTab('prestasi')">Prestasi</button>
    <button id="pp-admin-tab-pelanggaran" type="button" class="modal-btn" onclick="setPrestasiPelanggaranTab('pelanggaran')">Pelanggaran</button>
  </div>

  <div id="pp-admin-panel-prestasi" class="pp-admin-card" style="display:none;">
    <div class="pp-admin-title">Input Prestasi Santri</div>
    <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:10px;">
      <div>
        <label class="pp-label">Filter Kelas</label>
        <select id="pp-prestasi-kelas-filter" class="pp-field" onchange="onPrestasiPelanggaranClassFilterChange('prestasi')"></select>
      </div>
      <div>
        <label class="pp-label">Nama Santri (Ketik / Cari)</label>
        <input id="pp-prestasi-santri-search" class="pp-field" type="text" list="pp-prestasi-santri-list" placeholder="Ketik nama santri...">
        <datalist id="pp-prestasi-santri-list"></datalist>
      </div>
      <div>
        <label class="pp-label">Waktu</label>
        <input id="pp-prestasi-waktu" class="pp-field" type="date">
      </div>
      <div>
        <label class="pp-label">Kategori</label>
        <select id="pp-prestasi-kategori" class="pp-field">
          <option value="akademik">Akademik</option>
          <option value="ketahfizan">Ketahfizan</option>
          <option value="kemusyrifan">Kemusyrifan</option>
        </select>
      </div>
      <div>
        <label class="pp-label">Prestasi</label>
        <input id="pp-prestasi-judul" class="pp-field" type="text" placeholder="Contoh: Juara 1 Lomba Tahfiz">
      </div>
      <div style="grid-column:1 / -1;">
        <label class="pp-label">Sertifikat (URL File)</label>
        <input id="pp-prestasi-sertifikat" class="pp-field" type="text" placeholder="https://.../sertifikat.pdf">
      </div>
    </div>
    <div style="display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;">
      <button type="button" class="modal-btn modal-btn-primary" onclick="savePrestasiAdminEntry()">Simpan</button>
      <button type="button" class="modal-btn" onclick="resetPrestasiAdminForm()">Reset</button>
    </div>
  </div>

  <div id="pp-admin-panel-pelanggaran" class="pp-admin-card" style="display:none;">
    <div class="pp-admin-title">Input Pelanggaran Santri</div>
    <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:10px;">
      <div>
        <label class="pp-label">Filter Kelas</label>
        <select id="pp-pelanggaran-kelas-filter" class="pp-field" onchange="onPrestasiPelanggaranClassFilterChange('pelanggaran')"></select>
      </div>
      <div>
        <label class="pp-label">Nama Santri (Ketik / Cari)</label>
        <input id="pp-pelanggaran-santri-search" class="pp-field" type="text" list="pp-pelanggaran-santri-list" placeholder="Ketik nama santri...">
        <datalist id="pp-pelanggaran-santri-list"></datalist>
      </div>
      <div>
        <label class="pp-label">Waktu</label>
        <input id="pp-pelanggaran-waktu" class="pp-field" type="date">
      </div>
      <div>
        <label class="pp-label">Kategori</label>
        <select id="pp-pelanggaran-kategori" class="pp-field">
          <option value="akademik">Akademik</option>
          <option value="ketahfizan">Ketahfizan</option>
          <option value="kemusyrifan">Kemusyrifan</option>
        </select>
      </div>
      <div>
        <label class="pp-label">Pelanggaran</label>
        <input id="pp-pelanggaran-judul" class="pp-field" type="text" placeholder="Contoh: Terlambat masuk kelas berulang">
      </div>
      <div>
        <label class="pp-label">Jenis Hukuman</label>
        <input id="pp-pelanggaran-hukuman" class="pp-field" type="text" placeholder="Contoh: Pembinaan + tugas kebersihan">
      </div>
      <div>
        <label class="pp-label">Surat Peringatan</label>
        <select id="pp-pelanggaran-surat-jenis" class="pp-field">
          <option value="">- Pilih -</option>
          <option value="Sanksi dan Teguran">Sanksi dan Teguran</option>
          <option value="ST1">ST1</option>
          <option value="ST2">ST2</option>
          <option value="ST3">ST3</option>
          <option value="SP1">SP1</option>
          <option value="SP2">SP2</option>
          <option value="SP3">SP3</option>
          <option value="DO">DO</option>
        </select>
      </div>
      <div style="grid-column:1 / -1;">
        <label class="pp-label">Surat Pemberitahuan (URL File)</label>
        <input id="pp-pelanggaran-surat-url" class="pp-field" type="text" placeholder="https://.../surat.pdf">
        <div style="display:flex; gap:8px; margin-top:8px; flex-wrap:wrap;">
          <input id="pp-pelanggaran-surat-file" type="file" accept=".pdf,.jpg,.jpeg,.png,.webp" style="display:none;" onchange="uploadPelanggaranSuratFile(event)">
          <button type="button" class="modal-btn" onclick="document.getElementById('pp-pelanggaran-surat-file')?.click()">Upload File</button>
        </div>
      </div>
    </div>
    <div style="display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;">
      <button type="button" class="modal-btn modal-btn-primary" onclick="savePelanggaranAdminEntry()">Simpan</button>
      <button type="button" class="modal-btn" onclick="resetPelanggaranAdminForm()">Reset</button>
    </div>
  </div>

  <div id="pp-admin-list-prestasi" class="pp-admin-card" style="display:none;">Loading...</div>
  <div id="pp-admin-list-pelanggaran" class="pp-admin-card" style="display:none;">Loading...</div>

  <div id="pp-admin-doc-overlay" style="display:none; position:fixed; inset:0; background:rgba(15,23,42,0.45); z-index:3000; padding:20px;">
    <div style="max-width:980px; margin:0 auto; background:#fff; border-radius:12px; border:1px solid #e2e8f0; overflow:hidden;">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:8px; padding:12px 14px; border-bottom:1px solid #e2e8f0;">
        <div id="pp-admin-doc-title" style="font-weight:700; color:#0f172a;">Dokumen</div>
        <div style="display:flex; gap:8px;">
          <a id="pp-admin-doc-download" href="#" target="_blank" rel="noopener" class="modal-btn">Download</a>
          <button type="button" class="modal-btn" onclick="closePrestasiPelanggaranDocPopup()">Tutup</button>
        </div>
      </div>
      <div style="padding:12px;">
        <iframe id="pp-admin-doc-frame" title="Dokumen" style="width:100%; height:70vh; border:1px solid #e2e8f0; border-radius:8px;"></iframe>
      </div>
    </div>
  </div>
</div>
