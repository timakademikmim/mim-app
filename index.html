<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function () {
      try {
        const params = new URLSearchParams(window.location.search || '');
        const isAndroidPreview = params.get('preview') === 'android';
        const isAndroidUA = /android/i.test(String(navigator.userAgent || ''));
        const hasTauriRuntime = !!(window.__TAURI__ || window.__TAURI_INTERNALS__);
        if (isAndroidPreview || (isAndroidUA && hasTauriRuntime)) {
          document.documentElement.classList.add('android-preboot');
        }
      } catch (e) {}
    })();
  </script>
  <style>
    html.android-preboot body { opacity: 0; }
  </style>
  <title>Login</title>
  <link rel="icon" type="image/png" href="00%20Logo%20MIM%20.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <img src="00 Logo MIM .png" alt="Logo MIM" class="brand-logo">
      <h1>Portal Akademik</h1>
      <p class="login-subtitle">Silakan login untuk melanjutkan ke sistem.</p>

      <h2>Login</h2>
      <label for="tenant_id">Unit Sekolah</label>
      <select id="tenant_id" disabled>
        <option value="">Memuat unit sekolah...</option>
      </select>

      <label for="id_karyawan">ID Karyawan</label>
      <input type="text" id="id_karyawan" placeholder="Masukkan ID Karyawan" autocomplete="username">

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Masukkan Password" autocomplete="current-password">

      <button id="login-button" onclick="login()">Masuk</button>
      <button type="button" onclick="requestPasswordReset()" style="margin-top:8px;background:transparent;color:#2563eb;box-shadow:none;">Lupa password?</button>
      <p id="error"></p>
    </div>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared/app-utils.js?v=20260701-tenant-storage-01"></script>
  <script src="shared/supabase-config.js?v=20260701-tenant-storage-01"></script>
  <script src="login.js?v=20260701-tenant-storage-01"></script>
</body>
</html>
